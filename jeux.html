<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <title>Doremo</title>
</head>
<body>
    <header>
        <img src="img/logo.svg" alt class="logo1">

                <div class="box-consigne">

                        <img src="img/vrai.svg" alt></img>
                        <div class="small-box"></div>
                        <p>
                            Appuiller sur " O " pour validé une reponce
                        </p>
                    </div>
                    <div class="logo-phrase">
                        <img src="img/restart.svg" alt></img>

                    </div>
                    <div class="logo-phrase">
                        <img src="img/faux.svg" alt></img>
                        <div class="small-box"></div>

                            Appuiller sur " N " pour une mauvaise reponce
                        </p>
                    </div>
                    <div class="logo-phrase">
                        <img src="img/4pts.svg" alt>
                        <div class="small-box"></div>
                        <p>4 pts atteint va allumer le jingle de victoire et

                    </div>

            </div>

    <script src="popup.js"></script>

                <p>4</p>
