<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="main.js" defer></script>
    <title>Doremo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&family=Roboto:ital,wght@0,300;1,300;1,700&display=swap"
            rel="stylesheet">
</head>
<body>
    <header>
        <img src="img/logo.svg" alt class="logo1">
    </header>
    <div id="looser">
        <p>
            Defaite
        </p>
    </div>
    <main class="mains">
        <button id="openPopup" class="questionMark">
            <img src="img/question mark.svg" alt></button>
        <div id="popupContainer" class="popup-container">
            <div class="popup-content">
                <button id="closePopup" class="closePopup">
                    <img src="img/X.svg" alt></button>
                <p class="consigne">Consignes</p>
                <div class="box-consigne">
                    <div class="logo-phrase">
                        <img src="img/vrai.svg" alt></img>
                        <div class="small-box"></div>
                        <p>
                            Appuiller sur " O " pour validé une reponce
                        </p>
                    </div>
                    <div class="logo-phrase">
                        <img src="img/restart.svg" alt></img>
                        <div class="small-box"></div>
                        <p>pour relancer le jeu.</p>
                    </div>
                    <div class="logo-phrase">
                        <img src="img/faux.svg" alt></img>
                        <div class="small-box"></div>
                        <p>
                            Appuiller sur " N " pour une mauvaise reponce
                        </p>
                    </div>
                    <div class="logo-phrase">
                        <img src="img/4pts.svg" alt>
                        <div class="small-box"></div>
                        <p>4 pts atteint va allumer le jingle de victoire et
                            le timer s’arrête.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <section id="games">
        <main>
            <div id="btn">
                <img src="img/du-son.png" alt="">
            </div>
            <div id="box-card">
                <div class="inside-card">
                <h1>Par combien de personnes est composé le groupe des Beatles?</h1>
                <div class="block-card"></div>
                <p>4</p>
                <div class="block-card"></div>
                <h1 id="timer">300 secondes</h1>
                </div>
            </div>
        </main>
        <aside>
            
            <button id="startBtn">Start / Restart Countdown</button>
            <div id="bar">
                <div class="level"></div>
                <div class="level"></div>
                <div class="level"></div>
                <div class="level"></div>
            </div>
            <p id="timer"></p>
        </aside>
    </section>
</body>
</html>
