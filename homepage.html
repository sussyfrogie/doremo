<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doremo</title>
    <style>
         body{
            margin: 0;
            background-color: #FDEEFF;
            width: 100%; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        main{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo{
            width: 800px;
            margin-bottom: 10px;
        }

        .commencer{
            cursor: pointer;
            border: 2px solid #FBCA04;
            outline: none;
            padding: 0;
            background-color: #FBCA04;
            border-radius: 10px;
            padding-left: 5px;
            transition: all 0.5s;
            margin-bottom: 12px;
        }

        .commencer:hover{
            background-color: #f7da66;
            border: 2px solid  #FDEEFF;
        }
        
        .consignes{
            cursor: pointer;
            border: 2px solid #FBCA04;
            outline: none;
            background: transparent;
            padding: 0;
            background-color: #FBCA04;
            border-radius: 10px;
            padding-left: 5px;
            transition: all 0.5s;
        }

        .consignes:hover{
            background-color: #f7da66;
            border: 2px solid  #FDEEFF;
        }

        .buttons{
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <main>
       <img src="img/logo.svg" alt="Logo Doremo" class="logo"></div>  
       <div class="buttons">
        <button type="button" class="commencer"><a href="jeux.html">
        <img src="img/commencer.svg" alt="Button Image"></a>
        <button type="button" class="consignes"><a href="consigne.html">
        <img src="img/consignes.svg" alt="Button Image"></a>
        </div> 
    </main>
</body>
</html>
